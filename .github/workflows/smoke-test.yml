name: smoke-test

# Runs the full pipeline end-to-end (local, no scheduler) on the tiny bundled
# synthetic fixture. Keeps the repo honest: any change that breaks
# fastq -> Consensus.vcf.gz turns the badge red.
#
# CI uses plasmo-call's OWN pixi env only (self-sufficient: snakemake + gatk4 +
# bcftools + samtools + bwa). It deliberately does NOT bootstrap vvg-box — that
# layer only provides the PBS/SLURM scheduler profiles, which CI doesn't need.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi (locked env)
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          locked: true            # fail if pixi.lock is out of sync with pixi.toml

      - name: End-to-end smoke test (fastq -> Consensus.vcf.gz)
        run: pixi run smoke-test

      - name: Show Consensus.vcf.gz header
        if: always()
        run: |
          f=output/calling/consensus/Consensus.vcf.gz
          test -f "$f" && pixi run -- bcftools view -h "$f" || echo "no consensus VCF produced"
