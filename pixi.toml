# =============================================================================
# plasmo-call — pixi manifest (variant-calling tools)
# Pinned for reproducibility; pixi.lock is the source of truth.
# GATK3 is intentionally absent — this is a GATK4 pipeline.
# Environment substrate (pixi + auto-detecting PBS/SLURM profiles) comes from
# vvg-box, bootstrapped by install.sh into ./box/.
# =============================================================================
[workspace]
name     = "plasmo-call"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

# Tools available on every supported platform.
[dependencies]
snakemake-minimal = ">=8.27,<9"
gatk4             = "4.6.2.*"
bcftools          = "1.21.*"
samtools          = "1.21.*"
bwa               = "0.7.18.*"
picard            = "3.3.*"
python            = "3.12.*"
pandas            = "2.2.*"

# bwa-mem2 uses x86 SIMD; bioconda has no osx-arm64 build. The aligner is a
# config toggle (config/config.yaml: aligner = "bwa" | "bwa-mem2"), so on
# osx-arm64 you can dev against the bwa path only.
[target.linux-64.dependencies]
bwa-mem2 = "2.2.1.*"

[target.osx-64.dependencies]
bwa-mem2 = "2.2.1.*"

[tasks]
# Print resolved versions of every calling tool (used by install.sh + docs).
# Delegated to a real bash script — pixi's task shell doesn't handle `2>&1 |`.
versions = "bash scripts/versions.sh"

# Local-mode run (no scheduler). Override cores with the CORES env var:
#   `CORES=8 pixi run run-local`.
run-local = { cmd = "snakemake --cores ${CORES} --snakefile workflow/Snakefile --configfile config/config.yaml", env = { CORES = "4" } }

# Dry-run / DAG parse check (used by acceptance + CI).
dry-run = "snakemake -n --snakefile workflow/Snakefile --configfile config/config.yaml"
