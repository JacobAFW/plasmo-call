# =============================================================================
# plasmo-call — pixi manifest (bioinformatics tools)
# Versions are placeholders to be PINNED + locked (pixi.lock) during the
# local build. GATK3 is intentionally gone; this is a GATK4 pipeline.
# Environment substrate (pixi instance + PBS/SLURM profiles) comes from vvg-box;
# install.sh bootstraps that. This manifest pins the calling tools themselves.
# =============================================================================
[workspace]
name = "plasmo-call"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
snakemake-minimal = ">=8"     # cluster-generic executor (matches vvg-box profiles)
gatk4             = "*"        # PIN during build (Java 17 runtime pulled in)
bcftools          = "*"        # PIN
samtools          = "*"        # PIN
bwa               = "*"        # PIN
bwa-mem2          = "*"        # optional aligner toggle
picard            = "*"        # PIN (MarkDuplicates)
python            = ">=3.11"
pandas            = "*"        # Snakefile interval wrangling

[tasks]
# convenience entrypoints — wired up during build
# run-local = "snakemake --cores 4 --use-conda ..."
